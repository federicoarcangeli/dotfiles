services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin

    restart: unless-stopped

    ports:
      - "8096:8096"
      - "8920:8920"  # HTTPS opzionale

    volumes:
      - ./config:/config
      - ./cache:/cache
      - ../library:/media

    environment:
      - JELLYFIN_PublishedServerUrl=http://192.168.1.14:8096

    # opzionale ma utile per performance transcoding
    devices:
      - /dev/dri:/dev/dri
