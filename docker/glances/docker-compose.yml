services:
  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped

    ports:
      - "61208:61208"

    environment:
      - GLANCES_OPT=-w

    pid: host

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
