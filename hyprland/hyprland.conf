# ~/.config/hypr/hyprland.conf

################
### MONITOR ###
################
monitor = HDMI-A-1, 1920x1080@144, -1080x0, 1, transform, 1
monitor = DP-3, 2560x1440@144, 0x0, 1

################
### AUTOSTART ###
################
exec-once = waybar
exec-once = mako
exec-once = hyprpaper

################
### INPUT ###
################
input {
    kb_layout = us
    kb_variant = intl
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

################
### LOOK ###
################
general {
    gaps_in = 5
    gaps_out = 15
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 10
}

animations {
    enabled = yes
}

################
### BINDS ###
################
$mainMod = SUPER

bind = $mainMod, T, exec, kitty
bind = $mainMod, E, exec, nautilus
bind = $mainMod, D, exec, wofi
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, F, fullscreen

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d


bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, TAB, cyclenext
bind = $mainMod, TAB, bringactivetotop
bind = $mainMod SHIFT, TAB, cyclenext, prev
bind = $mainMod SHIFT, TAB, bringactivetotop

bind = $mainMod, V, layoutmsg, togglesplit
bind = $mainMod CTRL, H, swapwindow, l
bind = $mainMod CTRL, J, swapwindow, d
bind = $mainMod CTRL, K, swapwindow, u
bind = $mainMod CTRL, L, swapwindow, r

#window resize 
bind = $mainMod, R, submap, resize


submap = resize

bind = , H, resizeactive, -20 0
bind = , L, resizeactive, 20 0
bind = , K, resizeactive, 0 -20
bind = , J, resizeactive, 0 20

bind = , escape, submap, reset
bind = , Return, submap, reset

submap = reset